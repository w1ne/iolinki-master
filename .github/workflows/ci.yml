name: iolinki-master CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  ctest:
    name: cmake-ctest
    # Pluto's repo runner is named `pluto-labwired-ci-runner` and exposes these labels.
    runs-on: [self-hosted, Linux, X64, ci]
    steps:
      - name: Checkout iolinki-master
        uses: actions/checkout@v4
        with:
          path: iolinki-master

      - name: Locate LabWired device stack
        id: labwired
        run: |
          set -euo pipefail

          candidates=(
            "$HOME/actions-runner-labwired-ci/_work/labwired/labwired/checkout-main/core/third_party/iolinki"
            "$HOME/actions-runner-labwired/_work/labwired/labwired/checkout-main/core/third_party/iolinki"
            "$HOME/actions-runner-labwired-ci/_work/labwired/labwired/core/third_party/iolinki"
            "$HOME/actions-runner-labwired/_work/labwired/labwired/core/third_party/iolinki"
            "$HOME/actions-runner-labwired-ci/_work/labwired/labwired/core/core/third_party/iolinki"
          )

          for dir in "${candidates[@]}"; do
            if [ -d "$dir/include/iolinki" ] && [ -f "$dir/src/frame.c" ]; then
              echo "IOLINKI_DEVICE_DIR=$dir" >> "$GITHUB_ENV"
              echo "Using LabWired device stack at $dir"
              exit 0
            fi
          done

          while IFS= read -r frame; do
            dir="$(dirname "$(dirname "$frame")")"
            if [ -d "$dir/include/iolinki" ]; then
              echo "IOLINKI_DEVICE_DIR=$dir" >> "$GITHUB_ENV"
              echo "Using LabWired device stack at $dir"
              exit 0
            fi
          done < <(find "$HOME" -path '*/core/third_party/iolinki/src/frame.c' -print 2>/dev/null)

          echo "::error::Could not locate LabWired core/third_party/iolinki on the Pluto runner."
          printf 'Checked candidates:\n'
          printf '  %s\n' "${candidates[@]}"
          exit 1

      - name: Ensure test dependencies
        run: |
          if command -v cc >/dev/null 2>&1 \
            && command -v cmake >/dev/null 2>&1 \
            && command -v pkg-config >/dev/null 2>&1 \
            && pkg-config --exists cmocka; then
            echo "CMake, C compiler, pkg-config, and CMocka are already available."
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libcmocka-dev

      - name: Configure
        run: |
          cmake -S iolinki-master -B iolinki-master/build \
            -DIOLINKI_DEVICE_DIR="$IOLINKI_DEVICE_DIR"

      - name: Build
        run: cmake --build iolinki-master/build

      - name: Test
        run: ctest --test-dir iolinki-master/build --output-on-failure
